<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects - Dongwoo Lee</title>
    <meta name="description" content="Project index for Dongwoo Lee.">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="shell">
        <nav class="nav" aria-label="Primary navigation">
          <a href="https://dev-heps.github.io/">Portfolio</a>
          <strong>Projects</strong>
          <a href="./guide/">Guide</a>
          <a href="https://github.com/dev-heps/projects">Source</a>
        </nav>
      </div>
    </header>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Project hub</p>
        <h1>Projects</h1>
        <p class="lede">A maintained index of project write-ups, source repositories, demos, and GitHub Pages publications.</p>
      </section>
      <section class="projects" id="projects" aria-label="Project list"></section>
    </main>
    <footer class="shell">&copy; 2026 Dongwoo Lee. Back to <a href="https://dev-heps.github.io/">Portfolio</a>.</footer>
    <script src="./projects.js"></script>
    <script>
      const root = document.querySelector("#projects");

      root.innerHTML = projects.map((project) => `
        <article class="project">
          <div>
            <h2>${project.title}</h2>
            <p>${project.summary}</p>
            <div class="meta">
              <span>${project.status}</span>
              <span>${project.domain}</span>
              <span>${project.year}</span>
            </div>
          </div>
          <div class="links">
            ${project.source ? `<a href="${project.source}">Source</a>` : ""}
            ${project.demo ? `<a href="${project.demo}">Demo</a>` : ""}
            ${project.writeup ? `<a href="${project.writeup}">Write-up</a>` : ""}
          </div>
        </article>
      `).join("");
    </script>
  </body>
</html>
