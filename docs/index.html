<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects - Dongwoo Lee</title>
    <meta name="description" content="Project index for Dongwoo Lee.">
    <style>
      :root {
        --bg: #ffffff;
        --fg: #09090b;
        --muted: #71717a;
        --edge: rgba(0, 0, 0, 0.08);
        --card: rgba(0, 0, 0, 0.02);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      header, main, footer {
        max-width: 880px;
        margin: 0 auto;
        padding: 0 16px;
      }

      header {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--edge);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 14px;
      }

      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; text-underline-offset: 4px; }

      .muted { color: var(--muted); }

      .hero {
        padding: 64px 0 36px;
        border-bottom: 1px solid var(--edge);
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 8vw, 64px);
        line-height: 1;
        letter-spacing: 0;
      }

      .lede {
        max-width: 640px;
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 18px;
      }

      .projects {
        display: grid;
        gap: 12px;
        padding: 28px 0;
      }

      .project {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        padding: 18px;
        border: 1px solid var(--edge);
        background: var(--card);
      }

      .project h2 {
        margin: 0;
        font-size: 20px;
      }

      .project p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: var(--muted);
      }

      .meta span {
        border: 1px solid var(--edge);
        padding: 2px 8px;
      }

      .links {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        white-space: nowrap;
      }

      footer {
        padding-top: 28px;
        padding-bottom: 36px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        text-align: center;
      }

      @media (max-width: 720px) {
        header { align-items: flex-start; flex-direction: column; height: auto; gap: 8px; padding-top: 16px; padding-bottom: 16px; }
        .project { grid-template-columns: 1fr; }
        .links { white-space: normal; }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="https://dev-heps.github.io/">Portfolio</a>
      <a class="muted" href="https://github.com/dev-heps/projects">Source</a>
    </header>
    <main>
      <section class="hero">
        <h1>Projects</h1>
        <p class="lede">A maintained index of project write-ups, source repositories, demos, and GitHub Pages publications.</p>
      </section>
      <section class="projects" id="projects" aria-label="Project list"></section>
    </main>
    <footer>&copy; 2026 Dongwoo Lee.</footer>
    <script src="./projects.js"></script>
    <script>
      const root = document.querySelector("#projects");

      root.innerHTML = projects.map((project) => `
        <article class="project">
          <div>
            <h2>${project.title}</h2>
            <p>${project.summary}</p>
            <div class="meta">
              <span>${project.status}</span>
              <span>${project.domain}</span>
              <span>${project.year}</span>
            </div>
          </div>
          <div class="links">
            ${project.source ? `<a href="${project.source}">Source</a>` : ""}
            ${project.demo ? `<a href="${project.demo}">Demo</a>` : ""}
            ${project.writeup ? `<a href="${project.writeup}">Write-up</a>` : ""}
          </div>
        </article>
      `).join("");
    </script>
  </body>
</html>
